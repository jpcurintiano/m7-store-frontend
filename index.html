<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M7 STORE</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  min-height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75)), url("fundo.png");
  background-size: cover;
  background-position: center;
  display: grid;
  place-items: center;
  padding: 10px;
  color: #fff;
}

.container {
  width: min(92vw, 340px);
  background: rgba(0,0,0,0.75);
  border: 1px solid #d4af37;
  border-radius: 18px;
  padding: 12px;
  text-align: center;
  box-shadow: 0 0 25px rgba(212,175,55,0.3);
}

/* LOGO */
.logo {
  width: 70px;
  margin-bottom: 6px;
}

/* TITULO */
h1 {
  font-size: 22px;
  color: #d4af37;
  margin-bottom: 4px;
}

/* TEXTO */
.subtitulo {
  font-size: 12.5px;
  margin-bottom: 6px;
}

/* PREÇO */
.preco {
  font-size: 28px;
  font-weight: bold;
  margin: 6px 0;
}

/* STREAMINGS */
.lista {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 5px;
  margin-bottom: 7px;
}

.streaming {
  padding: 6px;
  font-size: 11px;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(212,175,55,0.4);
}

/* AVISO */
.aviso-email {
  font-size: 11px;
  padding: 7px;
  border-radius: 9px;
  background: rgba(0,0,0,0.7);
  border: 1px solid rgba(255,215,0,0.4);
  margin-bottom: 7px;
}

/* AREA COMPRA */
.area-compra {
  display: flex;
  gap: 6px;
}

/* INPUT */
input {
  width: 65%;
  height: 42px;
  padding: 0 10px;
  border-radius: 10px;
  border: 1px solid #d4af37;
  background: rgba(0,0,0,0.7);
  color: #fff;
}

/* BOTÃO */
.btn {
  width: 35%;
  height: 42px;
  border-radius: 10px;
  border: none;
  font-size: 11px;
  font-weight: bold;
  background: linear-gradient(135deg,#d4af37,#fff3b0,#d4af37);
  cursor: pointer;
}

.btn:active {
  transform: scale(0.95);
}

/* MOBILE */
@media (max-width: 320px) {
  .area-compra {
    flex-direction: column;
  }
  input, .btn {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <h1>M7 STORE</h1>

  <div class="subtitulo">
    Pacote completo por apenas R$29,90
  </div>

  <div class="preco">R$29,90</div>

  <div class="lista">
    <div class="streaming">Netflix</div>
    <div class="streaming">HBO Max</div>
    <div class="streaming">Disney+</div>
    <div class="streaming">Prime Video</div>
    <div class="streaming">Paramount+</div>
    <div class="streaming">Globoplay</div>
    <div class="streaming">Premiere</div>
    <div class="streaming">Sportv</div>
    <div class="streaming">ESPN</div>
  </div>

  <div class="aviso-email">
    Os acessos serão enviados para o e-mail após a confirmação da compra.
  </div>

  <div class="area-compra">
    <input id="email" type="email" placeholder="Digite seu e-mail">
    <button class="btn" onclick="comprar()">COMPRAR</button>
  </div>

</div>

<script>
function comprar() {
  const email = document.getElementById("email").value.trim();

  if (!email || !email.includes("@")) {
    alert("Digite um e-mail válido.");
    return;
  }

  // 🔥 REDIRECIONA DIRETO (SEM API)
  window.location.href = "https://mpago.la/2Lu7nSJ";
}
</script>

</body>
</html>

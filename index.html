<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>M7 Store</title>
</head>

<body style="background:#000;color:#fff;text-align:center;font-family:Arial">

<h1>M7 STORE</h1>
<p>Compra segura via Pix</p>

<input id="email" placeholder="Seu email"><br><br>
<input id="cpf" placeholder="Seu CPF"><br><br>

<button onclick="comprar()">Pagar com Pix</button>

<div id="pix"></div>

<script>
function validarCPF(cpf) {
  cpf = cpf.replace(/\D/g, "");
  if (cpf.length !== 11) return false;
  return true;
}

// máscara
document.getElementById("cpf").addEventListener("input", e => {
  let v = e.target.value.replace(/\D/g,"");
  v = v.replace(/(\d{3})(\d)/,"$1.$2");
  v = v.replace(/(\d{3})(\d)/,"$1.$2");
  v = v.replace(/(\d{3})(\d{1,2})$/,"$1-$2");
  e.target.value = v;
});

async function comprar() {
  const email = document.getElementById("email").value;
  const cpf = document.getElementById("cpf").value;

  const res = await fetch("https://SEU-BACKEND.onrender.com/create-payment", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ email, cpf })
  });

  const data = await res.json();

  document.getElementById("pix").innerHTML = `
    <img src="data:image/png;base64,${data.qr_base64}" width="200"><br>
    <textarea style="width:90%">${data.qr_code}</textarea>
  `;

  verificarPagamento(data.payment_id);
}

function verificarPagamento(id) {
  setInterval(async () => {
    const res = await fetch(`https://SEU-BACKEND.onrender.com/payment-status/${id}`);
    const data = await res.json();

    if (data.status === "approved") {
      alert("Pagamento aprovado!");
    }
  }, 5000);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050505">

<link rel="icon" type="image/png" href="topo.png">

<title>M7 STORE - Pagamento via PIX</title>

<style>
:root {
  --gold: #d4af37;
  --gold-strong: #f2cf63;
  --gold-soft: #fff3b0;
  --pix: #32bcad;
  --text: #ffffff;
  --muted: #d8d8d8;
  --soft: rgba(255, 255, 255, 0.08);
  --line: rgba(212, 175, 55, 0.38);
  --panel: rgba(0, 0, 0, 0.9);
  --panel-strong: rgba(0, 0, 0, 0.96);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  width: 100%;
  min-height: 100%;
  -webkit-text-size-adjust: 100%;
}

body {
  width: 100%;
  min-height: 100vh;
  background-color: #000;
  background-image:
    linear-gradient(rgba(0, 0, 0, 0.74), rgba(0, 0, 0, 0.9)),
    url("fundo5.png");
  background-repeat: no-repeat;
  background-position: center center;
  background-size: cover;
  color: var(--text);
  font-family: Arial, Helvetica, sans-serif;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(90deg, rgba(0,0,0,0.58), transparent 28%, transparent 72%, rgba(0,0,0,0.58)),
    radial-gradient(circle at center, transparent 0 35%, rgba(0,0,0,0.42) 76%);
}

.page {
  position: relative;
  z-index: 1;
  width: 100%;
  min-height: 100vh;
  min-height: 100svh;
  min-height: 100dvh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding:
    max(26px, env(safe-area-inset-top))
    max(14px, env(safe-area-inset-right))
    max(22px, env(safe-area-inset-bottom))
    max(14px, env(safe-area-inset-left));
}

.shell {
  width: min(1060px, 100%);
  display: grid;
  grid-template-columns: minmax(0, 1fr) 390px;
  gap: 18px;
  align-items: stretch;
}

.panel,
.checkout {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 18px;
  box-shadow: 0 0 26px rgba(212, 175, 55, 0.24);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.panel {
  display: flex;
  flex-direction: column;

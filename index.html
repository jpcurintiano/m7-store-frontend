<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>M7 STORE</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

html, body {
  width: 100%;
  min-height: 100%;
}

body {
  min-height: 100dvh;
  background:
    linear-gradient(rgba(0,0,0,0.50), rgba(0,0,0,0.68)),
    url("fundo.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: #fff;
  display: grid;
  place-items: center;
  padding: 16px;
  overflow-x: hidden;
}

.container {
  width: min(92vw, 390px);
  background: rgba(0,0,0,0.72);
  border: 1.5px solid rgba(255,215,0,0.75);
  border-radius: 24px;
  padding: 22px;
  text-align: center;
  backdrop-filter: blur(8px);
  box-shadow:
    0 0 25px rgba(255,215,0,0.32),
    inset 0 0 18px rgba(255,215,0,0.08);
  animation: subir 0.6s ease;
}

@keyframes subir {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo {
  width: clamp(85px, 25vw, 112px);
  margin-bottom: 10px;
  filter: drop-shadow(0 0 16px rgba(255,215,0,0.9));
  animation: brilho 2s infinite alternate;
}

@keyframes brilho {
  from { transform: scale(1); }
  to { transform: scale(1.05); }
}

h1 {
  font-size: clamp(27px, 7vw, 32px);
  color: #ffd700;
  letter-spacing: 2px;
  margin-bottom: 8px;
  text-shadow: 0 0 14px rgba(255,215,0,0.7);
}

.subtitulo {
  font-size: clamp(14px, 3.7vw, 15.5px);
  line-height: 1.45;
  margin-bottom: 12px;
  color: #f4f4f4;
}

.subtitulo strong {
  color: #ffe26a;
}

.preco {
  font-size: clamp(38px, 11vw, 48px);
  font-weight: 900;
  color: #fff;
  margin: 10px 0 16px;
  text-shadow:
    0 0 10px rgba(255,215,0,0.9),
    0 0 22px rgba(255,215,0,0.75);
}

.preco span {
  color: #ffd700;
}

/* PARTE DESTACADA DOS STREAMINGS */
.lista {
  margin: 0 auto 14px;
  padding: 14px 12px;
  border-radius: 16px;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.92), rgba(30,22,0,0.92));
  border: 2px solid #ffd700;
  box-shadow:
    0 0 16px rgba(255,215,0,0.55),
    inset 0 0 16px rgba(255,215,0,0.16);
}

.lista-titulo {
  font-size: 12px;
  font-weight: 900;
  color: #ffd700;
  letter-spacing: 1.4px;
  margin-bottom: 10px;
  text-transform: uppercase;
  text-shadow: 0 0 10px rgba(255,215,0,0.8);
}

.streamings {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 7px;
}

.streamings span {
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(255,215,0,0.45);
  color: #ffffff;
  padding: 6px 9px;
  border-radius: 999px;
  font-size: clamp(12px, 3.3vw, 13.5px);
  font-weight: 800;
  text-shadow: 0 0 8px rgba(255,255,255,0.4);
  box-shadow: 0 0 8px rgba(255,215,0,0.15);
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,215,0,0.85);
  background: rgba(0,0,0,0.75);
  color: #fff;
  font-size: 16px;
  outline: none;
}

input::placeholder {
  color: #d7d7d7;
}

.btn {
  width: 100%;
  margin-top: 13px;
  padding: 15px;
  border: none;
  border-radius: 13px;
  cursor: pointer;
  font-weight: 900;
  font-size: clamp(15px, 4vw, 16px);
  letter-spacing: 1.3px;
  background: linear-gradient(135deg, #d4af37, #fff1a3, #d4af37);
  color: #111;
  position: relative;
  overflow: hidden;
  transition: 0.25s ease;
  box-shadow: 0 0 22px rgba(255,215,0,0.5);
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 32px rgba(255,215,0,0.75);
}

.btn:active {
  transform: scale(0.98);
}

.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -110%;
  width: 60%;
  height: 100%;
  background: rgba(255,255,255,0.5);
  transform: skewX(-25deg);
  animation: brilhoBtn 2.2s infinite;
}

@keyframes brilhoBtn {
  0% { left: -110%; }
  60% { left: 130%; }
  100% { left: 130%; }
}

#mensagem {
  margin-top: 12px;
  font-size: 14px;
}

.erro {
  color: #ff6b6b;
  font-weight: bold;
}

.sucesso {
  color: #ffd966;
  font-weight: bold;
}

#qr img {
  width: min(210px, 70vw);
  margin-top: 14px;
  background: white;
  padding: 8px;
  border-radius: 12px;
}

textarea {
  width: 100%;
  height: 105px;
  margin-top: 10px;
  padding: 10px;
  border-radius: 11px;
  border: 1px solid #d4af37;
  resize: none;
  font-size: 12px;
  outline: none;
}

@media (max-width: 430px) {
  body {
    background-position: center;
    padding: 12px;
  }

  .container {
    width: 94vw;
    padding: 18px;
    border-radius: 21px;
  }

  .streamings span {
    padding: 6px 8px;
  }
}
</style>
</head>

<body>
  <main class="container">
    <img src="logo.png" class="logo" alt="M7 Store Logo" />

    <h1>M7 STORE</h1>

    <p class="subtitulo">
      Compre o <strong>pacote de streaming</strong> por apenas
      <strong>R$29,90</strong>, com todos os streamings abaixo.
    </p>

    <div class="preco"><span>R$</span>29,90</div>

    <div class="lista">
      <div class="lista-titulo">Incluído no pacote</div>

      <div class="streamings">
        <span>Netflix</span>
        <span>HBO Max</span>
        <span>Disney+</span>
        <span>Prime Video</span>
        <span>Paramount+</span>
        <span>Globoplay</span>
        <span>Premiere</span>
        <span>Sportv</span>
        <span>ESPN</span>
      </div>
    </div>

    <input id="email" type="email" placeholder="Digite seu e-mail" />

    <button class="btn" onclick="gerarPix()">COMPRAR AGORA</button>

    <div id="mensagem"></div>
    <div id="qr"></div>
  </main>

<script>
const API_URL = "https://m7-store-api.onrender.com";

async function gerarPix() {
  const email = document.getElementById("email").value.trim();
  const msg = document.getElementById("mensagem");
  const qr = document.getElementById("qr");

  msg.innerHTML = "";
  qr.innerHTML = "";

  if (!email || !email.includes("@")) {
    msg.innerHTML = '<p class="erro">Digite um e-mail válido.</p>';
    return;
  }

  msg.innerHTML = '<p class="sucesso">Gerando Pix...</p>';

  try {
    const res = await fetch(`${API_URL}/create-payment`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (!res.ok) {
      msg.innerHTML = '<p class="erro">Erro ao gerar pagamento.</p>';
      return;
    }

    msg.innerHTML = '<p class="sucesso">Pix gerado com sucesso!</p>';

    qr.innerHTML = `
      <img src="data:image/png;base64,${data.qr_base64}" alt="QR Code Pix">
      <textarea id="pix" readonly>${data.qr_code}</textarea>
      <button class="btn" onclick="copiar()">COPIAR PIX</button>
    `;
  } catch {
    msg.innerHTML = '<p class="erro">Erro na conexão com a API.</p>';
  }
}

function copiar() {
  const pix = document.getElementById("pix").value;
  navigator.clipboard.writeText(pix);
  alert("Pix copiado!");
}
</script>
</body>
</html>

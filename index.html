<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M7 STORE</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  min-height: 100vh;
  background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.65)),
    url("fundo.png");
  background-size: cover;
  background-position: center;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* 🔥 CARD PRINCIPAL (AJUSTADO) */
.container {
  width: 100%;
  max-width: 380px;
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(212,175,55,0.5);
  border-radius: 22px;
  padding: 22px;
  text-align: center;
  backdrop-filter: blur(6px);
  box-shadow: 0 0 25px rgba(212,175,55,0.2);
  animation: subir 0.6s ease;
}

@keyframes subir {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo {
  width: 110px;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 15px gold);
  animation: brilho 2s infinite alternate;
}

@keyframes brilho {
  from { transform: scale(1); }
  to { transform: scale(1.05); }
}

h1 {
  font-size: 28px;
  color: #d4af37;
  margin-bottom: 6px;
}

.subtitulo {
  font-size: 15px;
  margin-bottom: 12px;
}

.subtitulo strong {
  color: gold;
}

.preco {
  font-size: 34px;
  font-weight: bold;
  color: gold;
  margin: 10px 0;
}

.lista {
  font-size: 14px;
  background: rgba(255,255,255,0.08);
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 12px;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid gold;
  background: rgba(0,0,0,0.6);
  color: white;
  margin-top: 10px;
}

/* BOTÃO ANIMADO */
.btn {
  width: 100%;
  margin-top: 12px;
  padding: 13px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  background: linear-gradient(135deg, #d4af37, #fff3b0);
  color: #111;
  position: relative;
  overflow: hidden;
  transition: 0.3s;
  animation: pulse 1.5s infinite;
}

.btn:hover {
  transform: scale(1.05);
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: rgba(255,255,255,0.4);
  transform: skewX(-25deg);
  animation: brilhoBtn 2s infinite;
}

@keyframes brilhoBtn {
  0% { left: -100%; }
  60% { left: 130%; }
  100% { left: 130%; }
}

#mensagem {
  margin-top: 10px;
}

.erro { color: red; }
.sucesso { color: gold; }

#qr img {
  width: 200px;
  margin-top: 15px;
  background: white;
  padding: 8px;
  border-radius: 10px;
}

textarea {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
}

/* RESPONSIVO */
@media (max-width: 480px) {
  .container {
    max-width: 95%;
  }

  .logo {
    width: 90px;
  }
}
</style>
</head>

<body>

<div class="container">
  <img src="logo.png" class="logo">

  <h1>M7 STORE</h1>

  <p class="subtitulo">
    Compre o <strong>pacote de streaming</strong> por apenas 
    <strong>R$29,90</strong>, com todos os streaming abaixo.
  </p>

  <div class="preco">R$29,90</div>

  <div class="lista">
    Netflix • HBO Max • Disney+ • Prime Video • Paramount+ <br>
    Globoplay • Premiere • Sportv • ESPN
  </div>

  <input id="email" type="email" placeholder="Digite seu e-mail">

  <button class="btn" onclick="gerarPix()">COMPRAR AGORA</button>

  <div id="mensagem"></div>
  <div id="qr"></div>
</div>

<script>
const API_URL = "https://m7-store-api.onrender.com";

async function gerarPix() {
  const email = document.getElementById("email").value;
  const msg = document.getElementById("mensagem");
  const qr = document.getElementById("qr");

  msg.innerHTML = "";
  qr.innerHTML = "";

  if (!email.includes("@")) {
    msg.innerHTML = '<p class="erro">Digite um e-mail válido</p>';
    return;
  }

  msg.innerHTML = '<p class="sucesso">Gerando Pix...</p>';

  try {
    const res = await fetch(API_URL + "/create-payment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (!res.ok) {
      msg.innerHTML = '<p class="erro">Erro ao gerar pagamento</p>';
      return;
    }

    msg.innerHTML = '<p class="sucesso">Pix gerado!</p>';

    qr.innerHTML = `
      <img src="data:image/png;base64,${data.qr_base64}">
      <textarea id="pix">${data.qr_code}</textarea>
      <button class="btn" onclick="copiar()">Copiar Pix</button>
    `;
  } catch {
    msg.innerHTML = '<p class="erro">Erro na conexão</p>';
  }
}

function copiar() {
  const pix = document.getElementById("pix").value;
  navigator.clipboard.writeText(pix);
  alert("Pix copiado!");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="topo.png">
    <title>M7 STORE - Loja de Streaming</title>

    <style>
        :root {
            --primary: #d4af37;
            --bg-glass: rgba(0, 0, 0, 0.6); /* Mais transparente para ver o fundo */
            --border-glass: rgba(255, 215, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100dvh;
            /* Gradiente mais suave para destacar a imagem fundo4.png */
            background: 
                linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
                url("fundo4.png") no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        /* CARD REDUZIDO (Para ocupar menos espaço na tela) */
        .card {
            width: 100%;
            max-width: 310px; /* Largura menor para mostrar mais o fundo */
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 15px;
            padding: 20px 15px;
            text-align: center;
            backdrop-filter: blur(5px); /* Blur reduzido para transparência mais límpida */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: subir 0.6s ease-out;
        }

        @keyframes subir {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            width: 60px; /* Logo menor */
            margin-bottom: 10px;
            filter: drop-shadow(0 0 5px var(--primary));
        }

        h1 {
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .preco {
            font-size: 1.8rem;
            font-weight: bold;
            display: block;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        /* LISTA COMPACTA */
        .lista {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            margin-bottom: 20px;
            list-style: none;
        }

        .item {
            font-size: 10px;
            padding: 5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 5px;
        }

        /* FORMULÁRIO E INPUTS */
        .form-compra {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input[type="email"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--primary);
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        input[type="email"]:focus {
            box-shadow: 0 0 8px var(--primary);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(135deg, var(--primary), #fff3b0, var(--primary));
            color: #000;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .aviso {
            font-size: 10px;
            color: #bbb;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <main class="card">
        <img src="logo.png" class="logo" alt="M7 Store">
        <h1>M7 STORE</h1>
        
        <strong class="preco">R$ 29,90</strong>

        <ul class="lista">
            <li class="item">Netflix</li>
            <li class="item">HBO Max</li>
            <li class="item">Disney+</li>
            <li class="item">Prime Video</li>
            <li class="item">Globoplay</li>
            <li class="item">Premiere</li>
        </ul>

        <!-- VALIDAÇÃO RECOMENDADA: Usando formulário nativo -->
        <form class="form-compra" id="formPay">
            <input 
                type="email" 
                id="email" 
                placeholder="Seu melhor e-mail" 
                required
            >
            <button type="submit" class="btn">Comprar Acesso</button>
        </form>

        <p class="aviso">O acesso será enviado ao e-mail digitado.</p>
    </main>

    <script>
        document.getElementById('formPay').addEventListener('submit', function(e) {
            // e.preventDefault() impede o envio se o navegador detectar erro no e-mail
            e.preventDefault();
            
            const emailValue = document.getElementById('email').value;
            
            // Simulação de "uso" do e-mail (por enquanto fica no console)
            console.log("E-mail capturado:", emailValue);

            // Redirecionamento após a validação nativa passar
            window.location.href = "https://mpago.la/2Lu7nSJ";
        });
    </script>

</body>
</html>

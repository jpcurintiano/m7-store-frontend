<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>M7 STORE</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  min-height: 100dvh;
  background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.7)),
    url("fundo.png");
  background-size: cover;
  background-position: center;
  display: grid;
  place-items: center;
  padding: 10px;
  color: #fff;
}

/* CONTAINER */
.container {
  width: min(92vw, 360px);
  background: rgba(0,0,0,0.75);
  border: 1px solid rgba(255,215,0,0.6);
  border-radius: 18px;
  padding: 14px;
  text-align: center;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 25px rgba(212,175,55,0.35);
}

/* LOGO */
.logo {
  width: 75px;
  margin-bottom: 6px;
  filter: drop-shadow(0 0 12px gold);
}

/* 🔥 ANIMAÇÃO DE TEXTO */
@keyframes brilhoTexto {
  0% { text-shadow: 0 0 5px #d4af37; }
  50% { text-shadow: 0 0 15px #ffd966; }
  100% { text-shadow: 0 0 5px #d4af37; }
}

/* TITULO */
h1 {
  font-size: 24px;
  color: #d4af37;
  margin-bottom: 4px;
  animation: brilhoTexto 2s infinite;
}

/* SUB */
.subtitulo {
  font-size: 13px;
  margin-bottom: 6px;
  animation: brilhoTexto 3s infinite;
}

/* PREÇO */
.preco {
  font-size: 34px;
  font-weight: 900;
  margin: 6px 0 8px;
  animation: brilhoTexto 1.5s infinite;
}

/* LISTA */
.lista {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 6px;
  margin-bottom: 7px;
}

.streaming {
  padding: 6px;
  font-size: 12px;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(212,175,55,0.4);
  cursor: pointer;
  transition: 0.2s;
  animation: brilhoTexto 3.5s infinite;
}

.streaming:hover {
  transform: scale(1.05);
  background: rgba(212,175,55,0.15);
  box-shadow: 0 0 12px gold;
}

/* AVISO */
.aviso-email {
  font-size: 11px;
  padding: 7px;
  border-radius: 10px;
  background: rgba(0,0,0,0.7);
  border: 1px solid rgba(255,215,0,0.4);
  margin-bottom: 8px;
  animation: brilhoTexto 4s infinite;
}

/* AREA COMPRA */
.area-compra {
  display: flex;
  gap: 6px;
}

/* INPUT (SEM ANIMAÇÃO) */
input {
  width: 65%;
  height: 42px;
  padding: 0 10px;
  border-radius: 10px;
  border: 1px solid #d4af37;
  background: rgba(0,0,0,0.7);
  color: #fff;
  outline: none;
}

/* BOTÃO */
.btn {
  width: 35%;
  height: 42px;
  border-radius: 10px;
  border: none;
  font-size: 11px;
  font-weight: 900;
  background: linear-gradient(135deg,#d4af37,#fff3b0,#d4af37);
  cursor: pointer;
  animation: brilhoTexto 2s infinite;
}

.btn:active {
  transform: scale(0.96);
}

#mensagem {
  margin-top: 8px;
  font-size: 12px;
}

#qr img {
  width: 160px;
  margin-top: 10px;
  background: white;
  padding: 6px;
  border-radius: 10px;
}

textarea {
  width: 100%;
  height: 70px;
  margin-top: 6px;
  border-radius: 8px;
  border: 1px solid #d4af37;
  font-size: 11px;
}

#qr .btn {
  width: 100%;
  margin-top: 6px;
}

/* MOBILE */
@media (max-width: 330px) {
  .area-compra {
    flex-direction: column;
  }
  input, .btn {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <h1>M7 STORE</h1>

  <div class="subtitulo">
    Compre o pacote por apenas R$29,90
  </div>

  <div class="preco">R$29,90</div>

  <div class="lista">
    <div class="streaming">Netflix</div>
    <div class="streaming">HBO Max</div>
    <div class="streaming">Disney+</div>
    <div class="streaming">Prime Video</div>
    <div class="streaming">Paramount+</div>
    <div class="streaming">Globoplay</div>
    <div class="streaming">Premiere</div>
    <div class="streaming">Sportv</div>
    <div class="streaming">ESPN</div>
  </div>

  <div class="aviso-email">
    Os acessos serão enviados para o e-mail após a confirmação da compra.
  </div>

  <div class="area-compra">
    <input id="email" type="email" placeholder="Seu e-mail">
    <button class="btn" onclick="gerarPix()">COMPRAR</button>
  </div>

  <div id="mensagem"></div>
  <div id="qr"></div>

</div>

<script>
const API_URL = "https://m7-store-api.onrender.com";

async function gerarPix() {
  const email = document.getElementById("email").value;
  const msg = document.getElementById("mensagem");
  const qr = document.getElementById("qr");

  msg.innerHTML = "Gerando Pix...";
  qr.innerHTML = "";

  try {
    const res = await fetch(`${API_URL}/create-payment`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    msg.innerHTML = "Pix gerado!";

    qr.innerHTML = `
      <img src="data:image/png;base64,${data.qr_base64}">
      <textarea readonly>${data.qr_code}</textarea>
      <button class="btn" onclick="navigator.clipboard.writeText('${data.qr_code}')">
        COPIAR
      </button>
    `;
  } catch {
    msg.innerHTML = "Erro ao gerar Pix";
  }
}
</script>

</body>
</html>

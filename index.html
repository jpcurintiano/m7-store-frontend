<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Assine os melhores serviços de streaming na M7 STORE por um preço acessível.">
    
    <!-- 🔥 FAVICON -->
    <link rel="icon" type="image/png" href="topo.png">

    <title>M7 STORE - Loja de Streaming</title>

    <style>
        /* VARIÁVEIS PARA MANUTENÇÃO FÁCIL */
        :root {
            --primary: #d4af37;
            --primary-glow: #ffd966;
            --bg-glass: rgba(0, 0, 0, 0.75);
            --border-glass: rgba(212, 175, 55, 0.5);
            --text-main: #ffffff;
            --text-dim: #cccccc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100dvh;
            /* Gradiente duplo para garantir leitura mesmo se a imagem demorar a carregar */
            background: 
                linear-gradient(var(--bg-glass), rgba(0, 0, 0, 0.85)),
                url("fundo4.png") no-repeat center center;
            background-size: cover;
            display: grid;
            place-items: center;
            padding: 20px;
            color: var(--text-main);
        }

        /* CONTAINER PRINCIPAL (MAIN) */
        .card {
            width: min(100%, 360px);
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 20px rgba(212, 175, 55, 0.15);
            animation: entrada 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes entrada {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* LOGO */
        .logo {
            width: 80px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px var(--primary));
        }

        /* TIPOGRAFIA */
        h1 {
            font-size: 1.6rem;
            color: var(--primary);
            letter-spacing: 1px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitulo {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        .preco {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 15px 0;
            display: block;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); text-shadow: 0 0 10px rgba(212,175,55,0.2); }
            50% { transform: scale(1.05); text-shadow: 0 0 25px var(--primary-glow); }
        }

        /* LISTA DE SERVIÇOS (UL/LI) */
        .servicos-lista {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .servico-item {
            padding: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            transition: all 0.3s ease;
        }

        .servico-item:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: var(--primary);
            transform: translateY(-3px);
        }

        /* AVISO */
        .info-box {
            font-size: 0.75rem;
            line-height: 1.5;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            margin-bottom: 25px;
            color: #aaa;
        }

        /* BOTÃO DE AÇÃO (CTA) */
        .btn-compra {
            display: block;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), #fff3b0, var(--primary));
            background-size: 200% auto;
            color: #000;
            text-decoration: none;
            font-weight: 800;
            font-size: 1rem;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .btn-compra:hover {
            background-position: right center;
            transform: scale(1.03);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
        }

        /* BRILHO ANIMADO NO BOTÃO */
        .btn-compra::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -60%;
            width: 20%;
            height: 200%;
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(30deg);
            transition: 0s;
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -60%; }
            20% { left: 120%; }
            100% { left: 120%; }
        }

        /* RESPONSIVIDADE */
        @media (max-width: 380px) {
            .card { padding: 20px 15px; }
            .preco { font-size: 2rem; }
            .servicos-lista { grid-template-columns: 1fr; } /* Empilha em telas muito pequenas */
        }
    </style>
</head>

<body>

    <main class="card">
        <header>
            <img src="logo.png" class="logo" alt="Logo M7 Store - Especialista em Streaming">
            <h1>M7 STORE</h1>
            <p class="subtitulo">Acesso premium ilimitado</p>
        </header>

        <section aria-label="Preço do plano">
            <strong class="preco">R$ 29,90</strong>
        </section>

        <section aria-label="Serviços inclusos">
            <ul class="servicos-lista">
                <li class="servico-item">Netflix 4K</li>
                <li class="servico-item">HBO Max</li>
                <li class="servico-item">Disney+</li>
                <li class="servico-item">Prime Video</li>
                <li class="servico-item">Paramount+</li>
                <li class="servico-item">Globoplay</li>
                <li class="servico-item">Premiere</li>
                <li class="servico-item">ESPN & Star+</li>
            </ul>
        </section>

        <footer class="info-box">
            <p>Entrega automática via e-mail imediatamente após a aprovação do pagamento pelo Mercado Pago.</p>
        </footer>

        <a href="https://mpago.la/2Lu7nSJ" class="btn-compra">
            ADQUIRIR AGORA
        </a>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- 🔥 FAVICON -->
<link rel="icon" type="image/png" href="topo.png">

<title>M7 STORE - Loja de Streaming</title>

<style>
/* --- CONFIGURAÇÕES GERAIS --- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  min-height: 100dvh;
  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)),
    url("fundo4.png") no-repeat center center;
  background-size: cover;
  background-attachment: fixed;
  display: grid;
  place-items: center;
  padding: 15px;
  color: #fff;
}

/* --- CONTAINER SLIM (Mais estreito para ver o fundo) --- */
.container {
  width: min(95vw, 320px); /* Reduzi para 320px para liberar mais o fundo */
  background: rgba(0,0,0,0.7);
  border: 1px solid rgba(255,215,0,0.5);
  border-radius: 18px;
  padding: 20px 15px;
  text-align: center;
  backdrop-filter: blur(6px);
  box-shadow: 0 0 25px rgba(212,175,55,0.3);
  animation: subir 0.6s ease;
}

/* --- ANIMAÇÕES ORIGINAIS (RESTAURADAS) --- */
@keyframes subir {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes brilhoTexto {
  0% { text-shadow: 0 0 5px #d4af37; }
  50% { text-shadow: 0 0 15px #ffd966; }
  100% { text-shadow: 0 0 5px #d4af37; }
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* --- ELEMENTOS --- */
.logo {
  width: 65px;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 10px gold);
  animation: pulse 2s infinite;
}

h1 {
  font-size: 20px;
  color: #d4af37;
  margin-bottom: 4px;
  animation: brilhoTexto 2s infinite;
}

.subtitulo {
  font-size: 12px;
  margin-bottom: 8px;
  animation: brilhoTexto 4s infinite;
}

.preco {
  font-size: 28px;
  font-weight: bold;
  margin: 10px 0;
  animation: brilhoTexto 1.5s infinite, pulse 1.5s infinite;
}

/* LISTA */
.lista {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  margin-bottom: 15px;
  list-style: none;
}

.streaming {
  padding: 6px;
  font-size: 10px;
  border-radius: 6px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(212,175,55,0.3);
  animation: brilhoTexto 4s infinite;
}

/* FORMULÁRIO E INPUT */
.area-compra {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

input[type="email"] {
  width: 100%;
  height: 42px;
  padding: 0 12px;
  border-radius: 10px;
  border: 1px solid #d4af37;
  background: rgba(0,0,0,0.6);
  color: #fff;
  font-size: 14px;
  outline: none;
  transition: 0.3s;
}

input[type="email"]:focus {
  box-shadow: 0 0 10px rgba(212,175,55,0.5);
  background: rgba(0,0,0,0.8);
}

/* BOTÃO COM EFEITOS */
.btn {
  width: 100%;
  height: 45px;
  border-radius: 10px;
  border: none;
  font-size: 13px;
  font-weight: bold;
  background: linear-gradient(135deg,#d4af37,#fff3b0,#d4af37);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(212,175,55,0.5);
  text-transform: uppercase;
}

.btn:hover {
  transform: scale(1.03);
  box-shadow: 0 0 25px gold;
}

/* Brilho passando no botão */
.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -120%;
  width: 50%;
  height: 100%;
  background: rgba(255,255,255,0.5);
  transform: skewX(-25deg);
  animation: brilhoBtn 2.5s infinite;
}

@keyframes brilhoBtn {
  0% { left: -120%; }
  60% { left: 130%; }
  100% { left: 130%; }
}

.aviso-email {
  font-size: 10px;
  margin-top: 10px;
  color: #ccc;
  line-height: 1.3;
}
</style>
</head>

<body>

<main class="container">
  <img src="logo.png" class="logo" alt="Logo">

  <h1>M7 STORE</h1>

  <p class="subtitulo">Pacote completo por apenas:</p>

  <div class="preco">R$ 29,90</div>

  <ul class="lista">
    <li class="streaming">Netflix</li>
    <li class="streaming">HBO Max</li>
    <li class="streaming">Disney+</li>
    <li class="streaming">Prime Video</li>
    <li class="streaming">Paramount+</li>
    <li class="streaming">Globoplay</li>
  </ul>

  <!-- FORMULÁRIO COM VALIDAÇÃO RECOMENDADA -->
  <form class="area-compra" id="formVenda">
    <input 
      type="email" 
      id="user_email" 
      placeholder="Digite seu e-mail" 
      required
    >
    <button type="submit" class="btn">Comprar Agora</button>
  </form>

  <p class="aviso-email">
    O acesso será enviado imediatamente para o e-mail acima.
  </p>
</main>

<script>
  // A validação 'required' e o type 'email' do HTML5 já fazem 90% do trabalho
  document.getElementById('formVenda').addEventListener('submit', function(e) {
    e.preventDefault(); // Impede o envio real do form
    
    const email = document.getElementById('user_email').value;
    
    // O console registra, mas o redirecionamento acontece logo após
    console.log("E-mail capturado:", email);
    
    // Redireciona para o Mercado Pago
    window.location.href = "https://mpago.la/2Lu7nSJ";
  });
</script>

</body>
</html>

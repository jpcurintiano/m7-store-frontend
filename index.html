<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- 🔥 FAVICON -->
<link rel="icon" type="image/png" href="topo.png">

<title>M7 STORE - Loja de Streaming</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  min-height: 100dvh;
  background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.75)),
    url("fundo4.png");
  background-size: cover;
  background-position: center;
  display: grid;
  place-items: center;
  padding: 10px;
  color: #fff;
}

/* CONTAINER */
.container {
  width: min(92vw, 350px);
  background: rgba(0,0,0,0.75);
  border: 1px solid rgba(255,215,0,0.6);
  border-radius: 18px;
  padding: 12px;
  text-align: center;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 28px rgba(212,175,55,0.35);
  animation: subir 0.6s ease;
}

@keyframes subir {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ANIMAÇÕES */
@keyframes brilhoTexto {
  0% { text-shadow: 0 0 5px #d4af37; }
  50% { text-shadow: 0 0 15px #ffd966; }
  100% { text-shadow: 0 0 5px #d4af37; }
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* LOGO */
.logo {
  width: 70px;
  margin-bottom: 6px;
  filter: drop-shadow(0 0 10px gold);
  animation: pulse 2s infinite;
}

/* TITULO */
h1 {
  font-size: 22px;
  color: #d4af37;
  margin-bottom: 4px;
  animation: brilhoTexto 2s infinite;
}

/* TEXTO */
.subtitulo {
  font-size: 12.5px;
  margin-bottom: 6px;
  animation: brilhoTexto 4s infinite;
}

/* PREÇO */
.preco {
  font-size: 30px;
  font-weight: bold;
  margin: 6px 0;
  animation: brilhoTexto 1.5s infinite, pulse 1.5s infinite;
}

/* LISTA */
.lista {
  display: grid;
  grid-template-columns: repeat(2,1fr);
  gap: 5px;
  margin-bottom: 7px;
}

.streaming {
  padding: 6px;
  font-size: 11px;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(212,175,55,0.4);
  cursor: pointer;
  transition: 0.2s;
  animation: brilhoTexto 4s infinite;
}

.streaming:hover {
  transform: scale(1.05);
  background: rgba(212,175,55,0.15);
  box-shadow: 0 0 12px gold;
}

/* AVISO */
.aviso-email {
  font-size: 11px;
  padding: 7px;
  border-radius: 9px;
  background: rgba(0,0,0,0.7);
  border: 1px solid rgba(255,215,0,0.4);
  margin-bottom: 7px;
  animation: brilhoTexto 5s infinite;
}

/* AREA COMPRA */
.area-compra {
  display: flex;
  gap: 6px;
}

input {
  width: 65%;
  height: 42px;
  padding: 0 10px;
  border-radius: 10px;
  border: 1px solid #d4af37;
  background: rgba(0,0,0,0.7);
  color: #fff;
}

/* BOTÃO */
.btn {
  width: 35%;
  height: 42px;
  border-radius: 10px;
  border: none;
  font-size: 11px;
  font-weight: bold;
  background: linear-gradient(135deg,#d4af37,#fff3b0,#d4af37);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(212,175,55,0.5);
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px gold;
}

.btn:active {
  transform: scale(0.95);
}

/* brilho botão */
.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -120%;
  width: 60%;
  height: 100%;
  background: rgba(255,255,255,0.4);
  transform: skewX(-25deg);
  animation: brilhoBtn 2s infinite;
}

@keyframes brilhoBtn {
  0% { left: -120%; }
  60% { left: 130%; }
  100% { left: 130%; }
}

/* MOBILE */
@media (max-width: 320px) {
  .area-compra {
    flex-direction: column;
  }
  input, .btn {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <h1>M7 STORE</h1>

  <div class="subtitulo">
    Pacote completo por apenas:
  </div>

  <div class="preco">R$29,90</div>

  <div class="lista">
    <div class="streaming">Netflix</div>
    <div class="streaming">HBO Max</div>
    <div class="streaming">Disney+</div>
    <div class="streaming">Prime Video</div>
    <div class="streaming">Paramount+</div>
    <div class="streaming">Globoplay</div>
    <div class="streaming">Premiere</div>
    <div class="streaming">Sportv</div>
    <div class="streaming">ESPN</div>
  </div>

  <div class="aviso-email">
    Os acessos serão enviados para o e-mail após a confirmação da compra.
  </div>

  <div class="area-compra">
    <input id="email" type="email" placeholder="Digite seu e-mail">
    <button class="btn" onclick="comprar()">COMPRAR</button>
  </div>

</div>

<script>
function comprar() {
  const email = document.getElementById("email").value.trim();

  if (!email || !email.includes("@")) {
    alert("Digite um e-mail válido.");
    return;
  }

  window.location.href = "https://mpago.la/2Lu7nSJ";
}
</script>

</body>
</html>

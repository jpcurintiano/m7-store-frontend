<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- 🔥 FAVICON -->
<link rel="icon" type="image/png" href="topo.png">

<title>M7 STORE - Loja de Streaming</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  min-height: 100dvh;
  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)),
    url("fundo4.png") no-repeat center center;
  background-size: cover;
  background-attachment: fixed;
  display: grid;
  place-items: center;
  padding: 10px;
  color: #fff;
}

/* CONTAINER SLIM */
.container {
  width: min(92vw, 300px); 
  background: rgba(0,0,0,0.75);
  border: 1px solid rgba(255,215,0,0.5);
  border-radius: 18px;
  padding: 15px;
  text-align: center;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 25px rgba(212,175,55,0.4);
  animation: subir 0.6s ease;
}

@keyframes subir {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ANIMAÇÕES DE BRILHO */
@keyframes brilhoTexto {
  0% { text-shadow: 0 0 5px #d4af37; }
  50% { text-shadow: 0 0 15px #ffd966; }
  100% { text-shadow: 0 0 5px #d4af37; }
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.04); }
  100% { transform: scale(1); }
}

.logo {
  width: 60px;
  margin-bottom: 5px;
  filter: drop-shadow(0 0 10px gold);
  animation: pulse 2s infinite;
}

h1 {
  font-size: 18px;
  color: #d4af37;
  margin-bottom: 2px;
  animation: brilhoTexto 2s infinite;
}

.subtitulo {
  font-size: 11px;
  margin-bottom: 5px;
  animation: brilhoTexto 4s infinite;
}

.preco {
  font-size: 26px;
  font-weight: bold;
  margin: 5px 0;
  animation: brilhoTexto 1.5s infinite, pulse 1.5s infinite;
}

/* LISTA APROXIMADA (GAP REDUZIDO) */
.lista {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 3px; /* APROXIMA OS BOTÕES LATERALMENTE E VERTICALMENTE */
  margin-bottom: 12px;
  list-style: none;
}

.streaming {
  padding: 4px; /* COMPACTA O TAMANHO DOS BOTÕES */
  font-size: 10px;
  border-radius: 5px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(212,175,55,0.3);
  animation: brilhoTexto 4s infinite;
}

/* FORMULÁRIO */
.form-venda {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

input[type="email"] {
  width: 100%;
  height: 38px;
  padding: 0 10px;
  border-radius: 8px;
  border: 1px solid #d4af37;
  background: rgba(0,0,0,0.6);
  color: #fff;
  font-size: 13px;
  outline: none;
}

.btn {
  width: 100%;
  height: 40px;
  border-radius: 8px;
  border: none;
  font-size: 12px;
  font-weight: bold;
  background: linear-gradient(135deg,#d4af37,#fff3b0,#d4af37);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(212,175,55,0.5);
  text-transform: uppercase;
}

.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -120%;
  width: 50%;
  height: 100%;
  background: rgba(255,255,255,0.5);
  transform: skewX(-25deg);
  animation: brilhoBtn 2.5s infinite;
}

@keyframes brilhoBtn {
  0% { left: -120%; }
  60% { left: 130%; }
  100% { left: 130%; }
}

.aviso-email {
  font-size: 9px;
  margin-top: 8px;
  color: #ccc;
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo" alt="Logo">

  <h1>M7 STORE</h1>

  <div class="subtitulo">Pacote completo por apenas:</div>

  <div class="preco">R$29,90</div>

  <ul class="lista">
    <li class="streaming">Netflix</li>
    <li class="streaming">HBO Max</li>
    <li class="streaming">Disney+</li>
    <li class="streaming">Prime Video</li>
    <li class="streaming">Paramount+</li>
    <li class="streaming">Globoplay</li>
    <li class="streaming">Premiere</li>
    <li class="streaming">Sportv</li>
    <li class="streaming">ESPN</li>
    <li class="streaming">Apple TV</li> <!-- Adicionado para fechar a grade com 10 -->
  </ul>

  <form class="form-venda" id="meuForm">
    <input type="email" id="email_cliente" placeholder="Digite seu melhor e-mail" required>
    <button type="submit" class="btn">COMPRAR AGORA</button>
  </form>

  <div class="aviso-email">O acesso será enviado para o e-mail acima.</div>

</div>

<script>
  document.getElementById('meuForm').addEventListener('submit', function(e) {
    e.preventDefault();
    window.location.href = "https://mpago.la/2Lu7nSJ";
  });
</script>

</body>
</html>

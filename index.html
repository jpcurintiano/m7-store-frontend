<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link rel="icon" type="image/png" href="topo.png">

<title>M7 STORE - Loja de Streaming</title>

<style>
:root {
  --gold: #d4af37;
  --gold-light: #fff3b0;
  --text: #ffffff;
  --dark: rgba(0, 0, 0, 0.78);
  --border: rgba(212, 175, 55, 0.45);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  width: 100%;
  min-height: 100%;
  -webkit-text-size-adjust: 100%;
}

body {
  width: 100%;
  min-height: 100vh;
  background:
    linear-gradient(rgba(0,0,0,0.58), rgba(0,0,0,0.78)),
    url("fundo5.png") center / cover no-repeat;
  color: var(--text);
  font-family: Arial, Helvetica, sans-serif;
  overflow-x: hidden;
}

/* CENTRALIZACAO REAL */
.page {
  width: 100%;
  min-height: 100vh;
  min-height: 100svh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding:
    max(14px, env(safe-area-inset-top))
    max(10px, env(safe-area-inset-right))
    max(14px, env(safe-area-inset-bottom))
    max(10px, env(safe-area-inset-left));
}

/* CONTAINER */
.container {
  width: min(92vw, 310px);
  margin: auto;
  padding: 15px;
  text-align: center;
  background: var(--dark);
  border: 1px solid var(--border);
  border-radius: 18px;
  box-shadow: 0 0 18px rgba(212, 175, 55, 0.32);
  animation: entrada 0.45s ease both;
}

@media (min-width: 768px) {
  .container {
    width: min(90vw, 320px);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
}

@keyframes entrada {
  from {
    opacity: 0;
    transform: translateY(12px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes brilhoTexto {
  0%, 100% {
    text-shadow: 0 0 4px var(--gold);
  }

  50% {
    text-shadow: 0 0 10px var(--gold-light);
  }
}

@keyframes pulse {
  0%, 100% {
    transform: scale(1);
  }

  50% {
    transform: scale(1.03);
  }
}

.logo {
  width: 62px;
  height: auto;
  display: block;
  margin: 0 auto 6px;
  filter: drop-shadow(0 0 8px gold);
  animation: pulse 2.8s ease-in-out infinite;
}

h1 {
  font-size: 19px;
  line-height: 1.1;
  color: var(--gold);
  margin-bottom: 4px;
  letter-spacing: 0;
  animation: brilhoTexto 2.8s ease-in-out infinite;
}

.subtitulo {
  font-size: 11px;
  line-height: 1.25;
  margin-bottom: 6px;
  color: #f3f3f3;
}

.preco {
  font-size: 28px;
  line-height: 1.1;
  font-weight: 800;
  margin: 6px 0 9px;
  color: var(--gold-light);
  text-shadow: 0 0 8px rgba(212, 175, 55, 0.75);
}

/* LISTA */
.lista {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 4px;
  margin-bottom: 12px;
  list-style: none;
}

.streaming {
  min-height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 4px 5px;
  font-size: 10px;
  line-height: 1.15;
  border-radius: 6px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(212,175,55,0.3);
  color: #fff;
}

/* FORMULARIO */
.form-venda {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

input[type="email"] {
  width: 100%;
  height: 40px;
  padding: 0 11px;
  border-radius: 8px;
  border: 1px solid var(--gold);
  background: rgba(0,0,0,0.62);
  color: #fff;
  font-size: 14px;
  outline: none;
}

input[type="email"]::placeholder {
  color: #cfcfcf;
}

input[type="email"]:focus {
  border-color: var(--gold-light);
  box-shadow: 0 0 0 2px rgba(212,175,55,0.22);
}

.btn {
  width: 100%;
  height: 42px;
  border-radius: 8px;
  border: none;
  font-size: 12px;
  font-weight: 800;
  color: #111;
  background: linear-gradient(135deg, #d4af37, #fff3b0, #d4af37);
  cursor: pointer;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 12px rgba(212,175,55,0.45);
  text-transform: uppercase;
  touch-action: manipulation;
}

.btn::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 -120%;
  width: 50%;
  background: rgba(255,255,255,0.42);
  transform: skewX(-25deg);
  animation: brilhoBtn 3s ease-in-out infinite;
}

.btn:active {
  transform: scale(0.98);
}

@keyframes brilhoBtn {
  0% {
    left: -120%;
  }

  60%, 100% {
    left: 130%;
  }
}

.aviso-email {
  margin-top: 8px;
  font-size: 9px;
  line-height: 1.35;
  color: #d0d0d0;
}

/* ANDROID / CELULAR: MAIS LEVE */
@media (max-width: 600px) {
  body {
    background-attachment: scroll;
  }

  .page {
    align-items: center;
    justify-content: center;
  }

  .container {
    width: min(92vw, 300px);
    padding: 14px;
    box-shadow: 0 0 12px rgba(212,175,55,0.25);
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
  }

  .logo {
    filter: none;
    animation: none;
  }

  h1,
  .btn::before {
    animation: none;
  }

  h1 {
    text-shadow: 0 0 5px rgba(212,175,55,0.75);
  }

  .preco {
    text-shadow: 0 0 6px rgba(212,175,55,0.65);
  }
}

/* TELAS MUITO BAIXAS */
@media (max-height: 620px) {
  .page {
    align-items: flex-start;
  }

  .container {
    margin-top: auto;
    margin-bottom: auto;
  }
}

/* ACESSIBILIDADE */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation: none !important;
    transition: none !important;
    scroll-behavior: auto !important;
  }
}
</style>
</head>

<body>

<main class="page">
  <section class="container" aria-label="Oferta M7 Store">

    <img src="logo.png" class="logo" alt="Logo M7 Store" loading="eager" decoding="async">

    <h1>M7 STORE</h1>

    <p class="subtitulo">
      PACOTE COM TODOS OS STREAMING ABAIXO POR APENAS:
    </p>

    <div class="preco">R$29,90</div>

    <ul class="lista">
      <li class="streaming">Netflix</li>
      <li class="streaming">HBO Max</li>
      <li class="streaming">Disney+</li>
      <li class="streaming">Prime Video</li>
      <li class="streaming">Paramount+</li>
      <li class="streaming">Globoplay</li>
      <li class="streaming">Premiere</li>
      <li class="streaming">Sportv</li>
      <li class="streaming">ESPN</li>
      <li class="streaming">Apple TV</li>
    </ul>

    <form class="form-venda" id="meuForm">
      <input
        type="email"
        id="email_cliente"
        name="email"
        placeholder="Digite seu melhor e-mail"
        autocomplete="email"
        inputmode="email"
        required
      >

      <button type="submit" class="btn" id="btnComprar">
        Comprar agora
      </button>
    </form>

    <p class="aviso-email">
      O acesso será enviado para o e-mail acima. Obs: o login enviado servirá para todos os streaming.
    </p>

  </section>
</main>

<script>
const form = document.getElementById("meuForm");
const emailInput = document.getElementById("email_cliente");
const btnComprar = document.getElementById("btnComprar");

form.addEventListener("submit", function(e) {
  e.preventDefault();

  const email = emailInput.value.trim();

  if (!email || !emailInput.checkValidity()) {
    emailInput.focus();
    alert("Digite um e-mail válido antes de continuar.");
    return;
  }

  btnComprar.disabled = true;
  btnComprar.textContent = "Redirecionando...";

  window.location.href = "https://mpago.la/2Lu7nSJ";
});
</script>

</body>
</html>

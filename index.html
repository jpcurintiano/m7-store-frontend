<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>M7 STORE</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

html, body {
  width: 100%;
  min-height: 100%;
}

body {
  min-height: 100dvh;
  background:
    linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
    url("fundo.png");
  background-size: cover;
  background-position: center;
  color: #fff;
  display: grid;
  place-items: center;
  padding: clamp(14px, 3vw, 28px);
  overflow-x: hidden;
}

/* 🔥 efeito luz passando no fundo */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255,215,0,0.15), transparent);
  animation: luz 6s infinite linear;
  pointer-events: none;
}

@keyframes luz {
  from { transform: translateX(-100%); }
  to { transform: translateX(100%); }
}

.container {
  width: min(92vw, 390px);
  max-height: 96dvh;
  overflow-y: auto;
  background: rgba(0,0,0,0.52);
  border: 1px solid rgba(212,175,55,0.55);
  border-radius: 22px;
  padding: clamp(18px, 4vw, 24px);
  text-align: center;
  backdrop-filter: blur(6px);
  box-shadow:
    0 0 28px rgba(212,175,55,0.25),
    inset 0 0 15px rgba(255,255,255,0.05);
  animation: subir 0.6s ease;
}

@keyframes subir {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo {
  width: clamp(82px, 25vw, 112px);
  margin-bottom: 10px;
  filter: drop-shadow(0 0 18px gold);
  animation: brilho 2s infinite alternate;
}

@keyframes brilho {
  from { transform: scale(1); }
  to { transform: scale(1.06); }
}

h1 {
  font-size: clamp(26px, 7vw, 30px);
  color: #ffd84d;
  letter-spacing: 2px;
  margin-bottom: 8px;
  text-shadow: 0 0 12px rgba(212,175,55,0.8);
}

.subtitulo {
  font-size: clamp(14px, 3.7vw, 15.5px);
  line-height: 1.45;
  margin-bottom: 12px;
}

.subtitulo strong {
  color: #ffd966;
}

.preco {
  font-size: clamp(36px, 10vw, 42px);
  font-weight: 900;
  color: #fff;
  margin: 10px 0 14px;
  text-shadow: 0 0 16px rgba(212,175,55,1);
}

.preco span {
  color: #d4af37;
}

/* 🔥 NOVA LISTA COM LOGOS */
.lista {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}

.item {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 10px;
  border-radius: 10px;
  transition: 0.25s;
}

.item:hover {
  transform: scale(1.05);
  border-color: gold;
  box-shadow: 0 0 12px rgba(212,175,55,0.5);
}

.item img {
  width: 22px;
  height: 22px;
  object-fit: contain;
}

.item span {
  font-weight: 700;
  font-size: 14px;
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(212,175,55,0.8);
  background: rgba(0,0,0,0.68);
  color: #fff;
  font-size: 16px;
  outline: none;
  transition: 0.2s;
}

input:focus {
  border-color: gold;
  box-shadow: 0 0 10px rgba(212,175,55,0.5);
}

/* BOTÃO */
.btn {
  width: 100%;
  margin-top: 13px;
  padding: 15px;
  border: none;
  border-radius: 13px;
  cursor: pointer;
  font-weight: 900;
  font-size: clamp(15px, 4vw, 16px);
  background: linear-gradient(135deg, #d4af37, #fff3b0);
  color: #111;
  position: relative;
  overflow: hidden;
  transition: 0.25s;
  box-shadow: 0 0 20px rgba(212,175,55,0.6);
}

.btn:hover {
  transform: scale(1.05);
}

.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -110%;
  width: 60%;
  height: 100%;
  background: rgba(255,255,255,0.4);
  transform: skewX(-25deg);
  animation: brilhoBtn 2s infinite;
}

@keyframes brilhoBtn {
  0% { left: -110%; }
  60% { left: 130%; }
  100% { left: 130%; }
}

#mensagem {
  margin-top: 12px;
}

.erro { color: #ff6b6b; }
.sucesso { color: gold; }

#qr img {
  width: min(210px, 70vw);
  margin-top: 14px;
  background: white;
  padding: 8px;
  border-radius: 12px;
}

textarea {
  width: 100%;
  height: 105px;
  margin-top: 10px;
  padding: 10px;
  border-radius: 11px;
}

/* MOBILE */
@media (max-width: 430px) {
  .lista {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>
  <main class="container">
    <img src="logo.png" class="logo" alt="M7 Store Logo" />

    <h1>M7 STORE</h1>

    <p class="subtitulo">
      Compre o <strong>pacote de streaming</strong> por apenas
      <strong>R$29,90</strong>, com todos os streaming abaixo.
    </p>

    <div class="preco"><span>R$</span>29,90</div>

    <!-- 🔥 LISTA COM LOGOS -->
    <div class="lista">
      <div class="item"><img src="logos/netflix.png"><span>Netflix</span></div>
      <div class="item"><img src="logos/hbo.png"><span>HBO Max</span></div>
      <div class="item"><img src="logos/disney.png"><span>Disney+</span></div>
      <div class="item"><img src="logos/prime.png"><span>Prime Video</span></div>
      <div class="item"><img src="logos/paramount.png"><span>Paramount+</span></div>
      <div class="item"><img src="logos/globo.png"><span>Globoplay</span></div>
      <div class="item"><img src="logos/premiere.png"><span>Premiere</span></div>
      <div class="item"><img src="logos/sporttv.png"><span>SporTV</span></div>
      <div class="item"><img src="logos/espn.png"><span>ESPN</span></div>
      <div class="item"><img src="logos/appletv.png"><span>Apple TV+</span></div>
    </div>

    <input id="email" type="email" placeholder="Digite seu e-mail" />

    <button class="btn" onclick="gerarPix()">COMPRAR AGORA</button>

    <div id="mensagem"></div>
    <div id="qr"></div>
  </main>

<script>
const API_URL = "https://m7-store-api.onrender.com";

async function gerarPix() {
  const email = document.getElementById("email").value.trim();
  const msg = document.getElementById("mensagem");
  const qr = document.getElementById("qr");
  const btn = document.querySelector(".btn");

  msg.innerHTML = "";
  qr.innerHTML = "";

  if (!email || !email.includes("@")) {
    msg.innerHTML = '<p class="erro">Digite um e-mail válido.</p>';
    return;
  }

  btn.innerText = "GERANDO...";
  btn.disabled = true;

  try {
    const res = await fetch(`${API_URL}/create-payment`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (!res.ok) {
      msg.innerHTML = '<p class="erro">Erro ao gerar pagamento.</p>';
      btn.innerText = "COMPRAR AGORA";
      btn.disabled = false;
      return;
    }

    msg.innerHTML = '<p class="sucesso">Pix gerado com sucesso!</p>';

    qr.innerHTML = `
      <img src="data:image/png;base64,${data.qr_base64}">
      <textarea id="pix">${data.qr_code}</textarea>
      <button class="btn" onclick="copiar()">COPIAR PIX</button>
    `;
  } catch {
    msg.innerHTML = '<p class="erro">Erro na conexão.</p>';
    btn.innerText = "COMPRAR AGORA";
    btn.disabled = false;
  }
}

function copiar() {
  const pix = document.getElementById("pix").value;
  navigator.clipboard.writeText(pix);
  alert("Pix copiado!");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M7 Store</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  font-family:Arial;
  background:linear-gradient(135deg,#000,#111);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  text-align:center;
  max-width:420px;
  width:100%;
}

.logo{
  width:160px;
  border-radius:50%;
  box-shadow:0 0 25px gold;
  animation:float 3s infinite;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0)}
}

.title{
  font-size:38px;
  background:linear-gradient(90deg,#fff,gold,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin-top:10px;
}

.card{
  margin-top:20px;
  background:#111;
  padding:25px;
  border-radius:20px;
  box-shadow:0 0 25px rgba(255,215,0,.2);
}

input{
  width:100%;
  padding:14px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#000;
  color:#fff;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(90deg,gold,#fff,gold);
  color:#000;
  transition:.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px gold;
}

.pix img{
  width:200px;
  margin-top:15px;
}

textarea{
  width:100%;
  height:70px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<img src="./logo.png" class="logo">

<h1 class="title">M7 STORE</h1>

<div class="card">

<input id="email" placeholder="Seu email">
<input id="cpf" placeholder="Seu CPF">

<button onclick="comprar()">COMPRAR COM PIX</button>

<div id="pix" class="pix"></div>

</div>

</div>

<script>
const API_URL = "https://m7-store-api.onrender.com";

let paymentId = null;

// máscara CPF
document.getElementById("cpf").addEventListener("input", e=>{
  let v=e.target.value.replace(/\D/g,"");
  v=v.replace(/(\d{3})(\d)/,"$1.$2");
  v=v.replace(/(\d{3})(\d)/,"$1.$2");
  v=v.replace(/(\d{3})(\d{1,2})$/,"$1-$2");
  e.target.value=v;
});

function validarCPF(cpf){
  cpf=cpf.replace(/\D/g,"");
  return cpf.length===11;
}

async function comprar(){
  const email=document.getElementById("email").value;
  const cpf=document.getElementById("cpf").value;
  const pix=document.getElementById("pix");

  if(!email.includes("@")) return alert("Email inválido");
  if(!validarCPF(cpf)) return alert("CPF inválido");

  pix.innerHTML="Gerando Pix...";

  const res=await fetch(API_URL+"/create-payment",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,cpf})
  });

  const data=await res.json();

  if(data.error){
    pix.innerHTML="Erro ao gerar pagamento";
    return;
  }

  paymentId=data.payment_id;

  pix.innerHTML=`
    <img src="data:image/png;base64,${data.qr_base64}">
    <textarea>${data.qr_code}</textarea>
  `;

  verificarPagamento();
}

function verificarPagamento(){
  setInterval(async ()=>{
    if(!paymentId) return;

    const res=await fetch(API_URL+"/payment-status/"+paymentId);
    const data=await res.json();

    if(data.status==="approved"){
      alert("Pagamento aprovado!");
    }
  },5000);
}
</script>

</body>
</html>

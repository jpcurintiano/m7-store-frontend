<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>M7 STORE</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

html, body {
  width: 100%;
  min-height: 100%;
}

body {
  min-height: 100dvh;
  background:
    linear-gradient(rgba(0,0,0,0.46), rgba(0,0,0,0.62)),
    url("fundo.png");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  color: #fff;
  display: grid;
  place-items: center;
  padding: clamp(14px, 3vw, 28px);
  overflow-x: hidden;
}

.container {
  width: min(94vw, 410px);
  max-height: 96dvh;
  overflow-y: auto;
  background: rgba(0,0,0,0.68);
  border: 1px solid rgba(255,215,0,0.65);
  border-radius: 24px;
  padding: clamp(18px, 4vw, 24px);
  text-align: center;
  backdrop-filter: blur(8px);
  box-shadow: 0 0 35px rgba(212,175,55,0.32);
  animation: subir 0.6s ease;
}

@keyframes subir {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo {
  width: clamp(82px, 25vw, 112px);
  margin-bottom: 10px;
  filter: drop-shadow(0 0 16px rgba(255,215,0,0.9));
  animation: brilhoLogo 2s infinite alternate;
}

@keyframes brilhoLogo {
  from { transform: scale(1); }
  to { transform: scale(1.04); }
}

h1 {
  font-size: clamp(26px, 7vw, 32px);
  color: #d4af37;
  letter-spacing: 2px;
  margin-bottom: 8px;
  text-shadow: 0 0 12px rgba(212,175,55,0.55);
}

.subtitulo {
  font-size: clamp(14px, 3.7vw, 15.5px);
  line-height: 1.45;
  margin-bottom: 12px;
}

.subtitulo strong {
  color: #ffd966;
}

.preco {
  font-size: clamp(38px, 10vw, 48px);
  font-weight: 900;
  color: #fff;
  margin: 10px 0 14px;
  text-shadow: 0 0 18px rgba(212,175,55,0.9);
}

.preco span {
  color: #d4af37;
}

.lista {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 9px;
  margin-bottom: 12px;
}

.streaming {
  padding: 10px 8px;
  border-radius: 11px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(212,175,55,0.42);
  color: #fff;
  font-size: clamp(12.5px, 3.4vw, 14px);
  font-weight: 800;
  text-shadow: 0 0 8px rgba(0,0,0,0.9);
  transition: 0.25s ease;
  cursor: pointer;
}

.streaming:hover {
  transform: scale(1.06) translateY(-2px);
  background: rgba(212,175,55,0.16);
  border-color: #ffd966;
  box-shadow: 0 0 16px rgba(212,175,55,0.72);
  color: #ffd966;
}

.aviso-email {
  margin: 12px 0 14px;
  padding: 12px;
  border-radius: 13px;
  background: rgba(0,0,0,0.72);
  border: 1px solid rgba(255,215,0,0.45);
  color: #fff;
  font-size: clamp(12.5px, 3.4vw, 14px);
  line-height: 1.45;
  box-shadow: 0 0 14px rgba(212,175,55,0.2);
}

.aviso-email strong {
  color: #ffd966;
}

input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(212,175,55,0.8);
  background: rgba(0,0,0,0.72);
  color: #fff;
  font-size: 16px;
  outline: none;
}

input::placeholder {
  color: #cfcfcf;
}

.btn {
  width: 100%;
  margin-top: 13px;
  padding: 15px;
  border: none;
  border-radius: 13px;
  cursor: pointer;
  font-weight: 900;
  font-size: clamp(15px, 4vw, 16px);
  letter-spacing: 1.2px;
  background: linear-gradient(135deg, #d4af37, #fff3b0, #d4af37);
  color: #111;
  position: relative;
  overflow: hidden;
  transition: 0.25s ease;
  box-shadow: 0 0 22px rgba(212,175,55,0.5);
}

.btn:hover {
  transform: scale(1.03);
  box-shadow: 0 0 28px rgba(255,215,0,0.75);
}

.btn:active {
  transform: scale(0.98);
}

.btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -110%;
  width: 60%;
  height: 100%;
  background: rgba(255,255,255,0.45);
  transform: skewX(-25deg);
  animation: brilhoBtn 2.2s infinite;
}

@keyframes brilhoBtn {
  0% { left: -110%; }
  60% { left: 130%; }
  100% { left: 130%; }
}

#mensagem {
  margin-top: 12px;
  font-size: 14px;
}

.erro {
  color: #ff6b6b;
  font-weight: bold;
}

.sucesso {
  color: #ffd966;
  font-weight: bold;
}

#qr img {
  width: min(210px, 70vw);
  margin-top: 14px;
  background: white;
  padding: 8px;
  border-radius: 12px;
}

textarea {
  width: 100%;
  height: 105px;
  margin-top: 10px;
  padding: 10px;
  border-radius: 11px;
  border: 1px solid #d4af37;
  resize: none;
  font-size: 12px;
  outline: none;
}

@media (max-width: 430px) {
  body {
    background-position: center center;
  }

  .container {
    width: min(94vw, 380px);
    border-radius: 20px;
    padding: 17px;
  }

  .lista {
    gap: 7px;
  }

  .streaming {
    padding: 9px 6px;
  }
}

@media (min-width: 900px) {
  .container:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 42px rgba(212,175,55,0.36);
  }
}
</style>
</head>

<body>
  <main class="container">
    <img src="logo.png" class="logo" alt="M7 Store Logo" />

    <h1>M7 STORE</h1>

    <p class="subtitulo">
      Compre o <strong>pacote de streaming</strong> por apenas
      <strong>R$29,90</strong>, com todos os streaming abaixo.
    </p>

    <div class="preco"><span>R$</span>29,90</div>

    <div class="lista">
      <div class="streaming">Netflix</div>
      <div class="streaming">HBO Max</div>
      <div class="streaming">Disney+</div>
      <div class="streaming">Prime Video</div>
      <div class="streaming">Paramount+</div>
      <div class="streaming">Globoplay</div>
      <div class="streaming">Premiere</div>
      <div class="streaming">Sportv</div>
      <div class="streaming">ESPN</div>
    </div>

    <div class="aviso-email">
      📩 <strong>Importante:</strong> os acessos serão enviados para o e-mail informado após a confirmação da compra.
    </div>

    <input id="email" type="email" placeholder="Digite seu e-mail" />

    <button class="btn" onclick="gerarPix()">COMPRAR AGORA</button>

    <div id="mensagem"></div>
    <div id="qr"></div>
  </main>

<script>
const API_URL = "https://m7-store-api.onrender.com";

async function gerarPix() {
  const email = document.getElementById("email").value.trim();
  const msg = document.getElementById("mensagem");
  const qr = document.getElementById("qr");

  msg.innerHTML = "";
  qr.innerHTML = "";

  if (!email || !email.includes("@")) {
    msg.innerHTML = '<p class="erro">Digite um e-mail válido.</p>';
    return;
  }

  msg.innerHTML = '<p class="sucesso">Gerando Pix...</p>';

  try {
    const res = await fetch(`${API_URL}/create-payment`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (!res.ok) {
      msg.innerHTML = '<p class="erro">Erro ao gerar pagamento.</p>';
      return;
    }

    msg.innerHTML = '<p class="sucesso">Pix gerado com sucesso!</p>';

    qr.innerHTML = `
      <img src="data:image/png;base64,${data.qr_base64}" alt="QR Code Pix">
      <textarea id="pix" readonly>${data.qr_code}</textarea>
      <button class="btn" onclick="copiar()">COPIAR PIX</button>
    `;
  } catch {
    msg.innerHTML = '<p class="erro">Erro na conexão com a API.</p>';
  }
}

function copiar() {
  const pix = document.getElementById("pix").value;
  navigator.clipboard.writeText(pix);
  alert("Pix copiado!");
}
</script>
</body>
</html>
